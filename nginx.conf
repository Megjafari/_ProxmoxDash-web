server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets (Vite emits filename hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path returns index.html so React Router
    # can handle client-side routing (e.g. /terminal/103, /login).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html — we always want the latest bundle references
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}